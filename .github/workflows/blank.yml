name: Build and Release Android APK

on:
  workflow_dispatch: # This adds the "Run workflow" button on the website
  push:
    branches:
      - main # This automatically builds when you edit code on the main branch

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Auto-Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }} # Automatically creates a unique tag like "build-4"
          name: Auto Build ${{ github.run_number }} # Automatically names the release
          files: app/build/outputs/apk/debug/app-debug.apk
